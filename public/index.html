<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SAP_COM_0008 实时查询看板</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-shape shape-a"></div>
  <div class="bg-shape shape-b"></div>

  <main class="shell">
    <header class="hero">
      <p class="tag">SAP Public Cloud · Read Only · PC</p>
      <h1>SAP Communication Scenarios<br>实时接口查询</h1>
      <p class="sub">左侧选择场景，右侧实时拉取并展示 SAP 原始字段。支持主从双表、多对象页签和状态巡检。</p>
    </header>

    <section class="workspace">
      <aside class="side-menu panel" id="sideMenu">
        <div class="menu-title">接口菜单</div>
        <div class="menu-list" id="menuList"></div>
      </aside>

      <section class="panel content-panel">
        <div class="toolbar">
          <div class="selected" id="selectedScenario">未选择场景</div>
          <div class="toolbar-actions">
            <button id="scanBtn" class="btn btn-ghost">巡检33场景</button>
            <button id="refreshBtn" class="btn">立即查询</button>
          </div>
        </div>

        <div class="kpi-strip" id="kpiStrip"></div>

        <div class="filter-row">
          <label for="filterInput">可选 OData 过滤条件</label>
          <input id="filterInput" placeholder="例如：Customer eq '17100001' 或 BusinessPartner eq '1000000'" />
        </div>

        <div class="meta" id="meta">正在加载场景...</div>
        <div class="object-hits" id="objectHits"></div>
        <div id="objectTabs" class="object-tabs"></div>
        <div id="dataArea" class="data-area"></div>
      </section>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
